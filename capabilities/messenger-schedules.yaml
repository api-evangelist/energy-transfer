naftiko: 1.0.0-alpha2
info:
  label: Energy Transfer Messenger+ API — Schedules
  description: 'Energy Transfer Messenger+ API — Schedules. 1 operations. Lead operation: List schedules. Self-contained Naftiko
    capability covering one Energy Transfer business surface.'
  tags:
  - Energy Transfer
  - Schedules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENERGY_TRANSFER_API_KEY: ENERGY_TRANSFER_API_KEY
capability:
  consumes:
  - type: http
    namespace: messenger-schedules
    baseUri: https://dev.messenger.energytransfer.com
    description: Energy Transfer Messenger+ API — Schedules business capability. Self-contained, no shared references.
    resources:
    - name: schedules
      path: /schedules
      operations:
      - name: listschedules
        method: GET
        description: List schedules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ENERGY_TRANSFER_API_KEY}}'
  exposes:
  - type: rest
    namespace: messenger-schedules-rest
    port: 8080
    description: REST adapter for Energy Transfer Messenger+ API — Schedules. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/schedules
      name: schedules
      description: REST surface for schedules.
      operations:
      - method: GET
        name: listschedules
        description: List schedules
        call: messenger-schedules.listschedules
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: messenger-schedules-mcp
    port: 9090
    transport: http
    description: MCP adapter for Energy Transfer Messenger+ API — Schedules. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-schedules
      description: List schedules
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: messenger-schedules.listschedules
      outputParameters:
      - type: object
        mapping: $.
