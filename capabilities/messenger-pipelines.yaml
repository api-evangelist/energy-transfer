naftiko: 1.0.0-alpha2
info:
  label: Energy Transfer Messenger+ API — Pipelines
  description: 'Energy Transfer Messenger+ API — Pipelines. 1 operations. Lead operation: List pipelines. Self-contained Naftiko
    capability covering one Energy Transfer business surface.'
  tags:
  - Energy Transfer
  - Pipelines
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENERGY_TRANSFER_API_KEY: ENERGY_TRANSFER_API_KEY
capability:
  consumes:
  - type: http
    namespace: messenger-pipelines
    baseUri: https://dev.messenger.energytransfer.com
    description: Energy Transfer Messenger+ API — Pipelines business capability. Self-contained, no shared references.
    resources:
    - name: pipelines
      path: /pipelines
      operations:
      - name: listpipelines
        method: GET
        description: List pipelines
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ENERGY_TRANSFER_API_KEY}}'
  exposes:
  - type: rest
    namespace: messenger-pipelines-rest
    port: 8080
    description: REST adapter for Energy Transfer Messenger+ API — Pipelines. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/pipelines
      name: pipelines
      description: REST surface for pipelines.
      operations:
      - method: GET
        name: listpipelines
        description: List pipelines
        call: messenger-pipelines.listpipelines
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: messenger-pipelines-mcp
    port: 9090
    transport: http
    description: MCP adapter for Energy Transfer Messenger+ API — Pipelines. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-pipelines
      description: List pipelines
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: messenger-pipelines.listpipelines
      outputParameters:
      - type: object
        mapping: $.
