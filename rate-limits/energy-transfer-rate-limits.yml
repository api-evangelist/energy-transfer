specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Energy Transfer
providerId: energy-transfer
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Energy
  - Pipelines
  - Gas Scheduling
  - Rate Limiting
description: Energy Transfer does not publish public rate-limit documentation for the Messenger+ API.
  Limits are governed by partner agreements and internal gateway policy on the dev.messenger.energytransfer.com
  endpoint.
notes: No published rate-limit page was located at dev.messenger.energytransfer.com as of 2026-05-05.
  Limits below are non-reconciled placeholders.
sources:
  - https://dev.messenger.energytransfer.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Shipper / Partner Limit
    scope: contract
    metric: varies
    limit: see partner agreement
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter and honor the Retry-After header
      when present.
  - name: Contractual Scoping
    description: Rate limits and concurrency thresholds are negotiated with Energy Transfer as part of
      shipper/partner onboarding rather than published publicly.
maintainers:
