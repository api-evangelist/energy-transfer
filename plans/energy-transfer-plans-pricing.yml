description: Energy Transfer's Messenger+ platform is a partner/shipper-facing API for pipeline scheduling
  and nominations rather than a publicly priced developer product. Access is granted to authorized shippers
  and partners under pipeline tariffs and service agreements; no public per-request pricing is published.
notes: No public pricing page was located at dev.messenger.energytransfer.com or energytransfer.com as
  of 2026-05-05. Pricing for pipeline services is governed by FERC-filed tariffs and bilateral service
  agreements rather than a developer-portal price sheet.
sources:
  - https://dev.messenger.energytransfer.com/
  - https://www.energytransfer.com/
plans:
  - id: energy-transfer-shipper-partner
    name: Shipper / Partner Access
    type: enterprise
    description: API access for authorized shippers and counterparties to manage gas scheduling, nominations,
      and pipeline capacity through Messenger+. Access is established under pipeline service agreements
      and applicable tariffs.
    entries:
      - label: Messenger+ API Access
        name: messenger_api_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: see pipeline tariff / service agreement
        userMultiplied: false
    elements:
      - name: Gas Scheduling
      - name: Nominations
      - name: Capacity Management
      - name: Energy Transfer Messenger+ API
