specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Energy Transfer
providerId: energy-transfer
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Energy
  - Pipelines
  - Midstream
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps placeholder for Energy Transfer's Messenger+ platform. The economic
  surface here is pipeline transportation and storage services governed by FERC-filed tariffs, not per-API-call
  billing; FinOps practice attaches to the underlying logistics service rather than developer metering.
notes: No public usage/billing API was located. The relevant cost lines are pipeline tariff charges and
  contracted services; reconcile against the executed Transportation Service Agreement.
sources:
  - https://dev.messenger.energytransfer.com/
  - https://www.energytransfer.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Energy Transfer LP
serviceCategory: Pipeline & Midstream Services
billingModel:
  pricingCategory: Tariff / Contract
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Energy Transfer Messenger+ API
  ServiceCategory: Pipeline & Midstream Services
  ProviderName: Energy Transfer
  PublisherName: Energy Transfer LP
  InvoiceIssuerName: Energy Transfer LP
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - shipper
  - name: scheduled_volume
    unit: MMBtu
    aggregation: sum
    dimensions:
      - pipeline
      - shipper
      - cycle
  - name: contract_fee
    unit: month
    aggregation: sum
    dimensions:
      - contract
principles:
  - name: Visibility
    description: Visibility into pipeline usage and charges flows through Messenger+ statements and the
      monthly transportation invoice rather than an API-billing dashboard.
  - name: Allocation
    description: Allocate charges by shipper contract, pipeline, and nomination cycle.
  - name: Optimization
    description: Optimization is achieved through nomination accuracy, cycle scheduling, and capacity contract
      structuring; there are no API-level discount programs.
  - name: Accountability
    description: The shipper's commercial/operations team owns spend and reconciles against the Transportation
      Service Agreement and FERC-filed tariff.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
